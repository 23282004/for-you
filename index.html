<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    background: #ffb6c1;
}

/* ================= HEART INTRO ================= */
.intro {
    position: absolute;
    width: 100%;
    height: 100%;
}

/* HEART WRAPPER */
.heart-wrapper {
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 220px;
    height: 200px;
}

/* HEART HALVES */
.heart-half {
    position: absolute;
    width: 50%;
    height: 100%;
    overflow: hidden;
}

/* SVG SIZE */
.heart-half svg {
    width: 220px;
    height: 200px;
}

/* LEFT HALF */
.left {
    left: -300px;
}

/* RIGHT HALF */
.right {
    right: -300px;
}

.right svg {
    transform: translateX(-110px);
}

/* JOIN */
.left.join {
    left: 0;
    transition: 1.5s ease;
}

.right.join {
    right: 0;
    transition: 1.5s ease;
}

/* TEXT */
.centerText {
    position: absolute;
    top: 65%;
    width: 100%;
    text-align: center;
    font-size: 32px;
    color: white;
    opacity: 0;
    transition: 1s;
}

.show { opacity: 1; }

/* BUTTON */
.next-btn {
    margin-top: 20px;
    padding: 12px 25px;
    background: white;
    color: #ff4d6d;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
}

/* ================= MESSAGE ================= */
.main { display: none; }

.message {
    position: absolute;
    top: 40px;
    width: 65%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.4);
    padding: 25px;
    border-radius: 20px;
    font-size: 20px;
    line-height: 1.8;
    white-space: pre-line;
}

/* ================= FLOATING HEARTS ================= */
.small-heart {
    position: absolute;
    color: #ff4d6d;
    font-size: 18px;
    opacity: 0.7;
    animation: float 8s linear infinite;
}

@keyframes float {
    0% {
        transform: translateY(100vh) scale(0.8);
        opacity: 0;
    }
    20% {
        opacity: 0.7;
    }
    100% {
        transform: translateY(-10vh) scale(1.2);
        opacity: 0;
    }
}

/* ================= FINAL ================= */
.finalPage {
    display: none;
    width: 100%;
    height: 100vh;
    background: #ffb6c1;
    justify-content: center;
    align-items: center;
}

.finalText {
    font-size: 55px;
    color: #ff2e63;
    transform: scale(0);
    transition: 0.8s;
    text-align: center;
    text-shadow: 0 0 20px #ff4d6d;
}

.finalText.show {
    transform: scale(1.2);
}
</style>
</head>

<body>

<!-- INTRO -->
<div class="intro" id="intro">

    <div class="heart-wrapper">
        <div class="heart-half left" id="left">
            <svg viewBox="0 0 32 29.6">
                <path fill="#ff4d6d"
                d="M23.6,0c-3.4,0-6.4,2-7.6,5.1C14.8,2,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4
                c0,9.1,16,21.2,16,21.2s16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
            </svg>
        </div>

        <div class="heart-half right" id="right">
            <svg viewBox="0 0 32 29.6">
                <path fill="#ff4d6d"
                d="M23.6,0c-3.4,0-6.4,2-7.6,5.1C14.8,2,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4
                c0,9.1,16,21.2,16,21.2s16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
            </svg>
        </div>
    </div>

    <div class="centerText" id="introText">
        This is for PANKAJ ❤️<br><br>
        <button class="next-btn" onclick="startMessage()">Please Continue</button>
    </div>

</div>

<!-- MESSAGE -->
<div class="main" id="main">
    <div class="message" id="text"></div>
</div>

<!-- FINAL -->
<div class="finalPage" id="finalPage">
    <div class="finalText" id="finalText">
        Waiting for your message ❤️🥺
    </div>
</div>

<script>

/* START FLOATING HEARTS ALWAYS */
window.onload = function() {
    floatingHearts();
};

/* HEART JOIN */
setTimeout(() => {
    document.getElementById("left").classList.add("join");
    document.getElementById("right").classList.add("join");
}, 500);

setTimeout(() => {
    document.getElementById("introText").classList.add("show");
}, 2200);

/* START MESSAGE */
function startMessage() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("main").style.display = "block";

    typeMessage();
}

/* FLOATING HEARTS CONTINUOUS */
function floatingHearts() {
    setInterval(() => {
        let heart = document.createElement("div");
        heart.className = "small-heart";
        heart.innerHTML = "❤️";

        heart.style.left = Math.random() * 100 + "%";
        heart.style.animationDuration = (6 + Math.random()*4) + "s";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 10000);

    }, 400);
}

/* MESSAGE */
const message = `Okay, so i know this is from my side from only  but tbh i just cant get over you. I am falling for you everyday, i donot know why. I just see you and my day is already made. I know you donot feel the same. The gentle touch, the shy smiles , the eye contact, the funny moments , it feels joy in every moment you are around. Dekh yar mainu ni pta tere ch ki aa, kde aapa deep gllan baatan ni kitian but kuch tah h. Mainu tah tainu dekh k butterflies hundia ne , bs jee karda tainu dekhdi rvaa. M mndi aa tu busy rehna , theek aa yar hr koi aav d life ch busy hunda, m v huni aa, but ik vaari chance deke dekh, Mainu aav di feelings baare dss. Kde kde mainu lagda tu v mainu psnd karda pr fer kde kde lagda ki nhi yrr o normal aa.
 Hor v munde ne prr tere nl hiii kion?? kde ssochea. I know m tainu ik hfte pehla dssea but mainu tah 3 mihne toh aa. M relationship lai ni kehrhi but yaar j kuch dil ch hega o tah dss, ain mixed jyi feelings kaatoo dina. Dss kuch hega dil ch?? ❤️`;

function typeMessage() {
    let i = 0;
    const el = document.getElementById("text");

    function typing() {
        if (i < message.length) {
            el.innerHTML += message.charAt(i);
            i++;
            setTimeout(typing, 25);
        } else {
            setTimeout(showFinal, 1500);
        }
    }
    typing();
}

/* FINAL */
function showFinal() {
    document.getElementById("main").style.display = "none";
    let finalPage = document.getElementById("finalPage");
    finalPage.style.display = "flex";

    setTimeout(() => {
        document.getElementById("finalText").classList.add("show");
    }, 200);
}
</script>

</body>
</html>
